<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <defs>
    <style>
      .roof-line { 
        fill: none; 
        stroke: #111111; 
        stroke-width: 8; 
        stroke-linecap: round; 
        stroke-linejoin: round; 
      }
      .yellow-shape { 
        fill: #F3B022; 
      }
      .text-rb { 
        font-family: 'Arial', sans-serif; 
        font-weight: 900; 
        font-size: 85px; 
        fill: #111111; 
      }
      .text-builders { 
        font-family: 'Arial', sans-serif; 
        font-weight: 700; 
        font-size: 32px; 
        fill: #111111; 
        letter-spacing: 0.5px;
      }
      .window { 
        fill: #FFFFFF; 
      }
    </style>
  </defs>

  <path class="yellow-shape" d="M 65 200 L 65 100 L 190 100 L 260 65 L 360 140 L 260 140 L 200 180 L 180 200 Z" />

  <rect class="window" x="110" y="115" width="12" height="12" />
  <rect class="window" x="130" y="115" width="12" height="12" />
  <rect class="window" x="110" y="135" width="12" height="12" />
  <rect class="window" x="130" y="135" width="12" height="12" />

  <polyline class="roof-line" points="50,200 260,50 460,200" />
  
  <polyline class="roof-line" points="310,85 310,40 330,40 330,100" />

  <text x="65" y="200" class="text-rb">RB</text>

  <text x="65" y="245" class="text-builders">RATHNA BUILDERS</text>
  
  <line x1="65" y1="260" x2="430" y2="260" stroke="#111111" stroke-width="1.5" opacity="0.3"/>
</svg>
